name: Check Pagopar Docs

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Pagopar documentation
        run: node .github/scripts/check-docs.mjs
